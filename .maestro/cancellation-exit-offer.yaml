appId: com.expathub.app
name: Cancellation modal — exit offer step
tags:
  - conversion-lifts
  - mobile-ui
---
# Drives the CancellationModal `exit_offer` step end-to-end via the
# `/debug-cancellation` dev harness route. The harness wires the same
# `onAccept` callback contract used by `app/account.tsx`, so passing here
# means the modal:
#
# - Opens on the `exit_offer` step when `exitOffer.eligible=true`
#   (initial step is decided by `getInitialCancellationStep` in
#   `src/lib/conversionLifts.ts`).
# - Calls the wired `onAccept` when "Yes, keep me at 50% off" is tapped.
# - Closes itself after `onAccept` resolves.
- launchApp:
    clearState: true
- openLink: expathub://debug-cancellation
- assertVisible:
    id: "debug-cancellation"
- assertVisible: "exitOffer.eligible: true"
- tapOn:
    id: "debug-cancel-open"

# Exit-offer step must show first when eligible.
- assertVisible: "Wait — 50% off your next 3 months?"
- assertVisible:
    id: "exit-offer-accept"
- assertVisible:
    id: "exit-offer-decline"

# Accept the offer. Modal must close and the harness must record the
# onAccept wiring fired.
- tapOn:
    id: "exit-offer-accept"
- assertNotVisible: "Wait — 50% off your next 3 months?"
- assertVisible: "onAccept called: yes"
- assertVisible: "modal visible: no"
