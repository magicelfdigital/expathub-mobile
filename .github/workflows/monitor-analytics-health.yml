name: Monitor Analytics Health

# Polls the deployed analytics health probe at
# `/api/_internal/analytics-health`. The probe returns HTTP 503 once the
# in-process counter of `$identify` events arriving without
# `$anon_distinct_id` is non-zero, which silently breaks PostHog stitching
# across the signup boundary on whichever surface regressed (web, mobile,
# future entry point).
#
# Schedule is every 15 minutes so a regression pages the team within minutes
# instead of being buried in server logs. On failure the job opens (or
# updates) a single standing issue tagged `analytics-health` and `alert` so
# the on-call sees one persistent issue per outage rather than a noisy
# stream. The issue auto-closes on the next successful run.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run analytics health probe
        id: probe
        run: node scripts/monitoring/analytics-health-check.mjs
        continue-on-error: true

      - name: Ensure alert labels exist
        if: steps.probe.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Create labels if they don't already exist so `gh issue create`
          # below never fails on a missing label in a fresh repo.
          gh label create analytics-health \
            --color B60205 \
            --description "Analytics health probe failure" \
            >/dev/null 2>&1 || true
          gh label create alert \
            --color D93F0B \
            --description "Active alert that needs on-call attention" \
            >/dev/null 2>&1 || true

      - name: Open or update standing alert issue
        if: steps.probe.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Analytics health probe is failing"
          BODY=$(cat <<'EOF'
          The scheduled analytics health probe at
          `/api/_internal/analytics-health` is returning a non-200 status.

          The probe fires when the in-process counter of `$identify`
          events received without `$anon_distinct_id` becomes non-zero,
          which means PostHog can no longer stitch pre-account events to
          the post-account user on at least one surface.

          **Triage:**
          1. Hit the probe directly: `curl -i https://www.expathub.website/api/_internal/analytics-health`
          2. Note the `by_surface` breakdown — that tells you which client regressed (`web`, `mobile`, etc).
          3. Recently shipped code on that surface is the prime suspect — look for changes to whoever calls PostHog `identify`.
          4. Once fixed and deployed, restart the backend workflow to reset the counter; the next probe run will auto-close this issue.

          See `scripts/monitoring/README.md` for full background.

          ---
          _Auto-managed by `.github/workflows/monitor-analytics-health.yml`._
          EOF
          )
          EXISTING=$(gh issue list --state open --label analytics-health --search "$TITLE in:title" --json number --jq '.[0].number' || true)
          if [ -n "${EXISTING:-}" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "Probe still failing as of $(date -u +%FT%TZ). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            gh issue create \
              --title "$TITLE" \
              --label analytics-health \
              --label alert \
              --body "$BODY"
          fi

      - name: Auto-close standing alert on recovery
        if: steps.probe.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for n in $(gh issue list --state open --label analytics-health --json number --jq '.[].number'); do
            gh issue close "$n" --comment "Probe is healthy again as of $(date -u +%FT%TZ). Auto-closing."
          done

      - name: Fail the job if the probe failed
        if: steps.probe.outcome == 'failure'
        run: |
          echo "Analytics health probe failed — see logs above."
          exit 1
