name: Playwright

on:
  push:
  pull_request:

jobs:
  conversion-lifts:
    name: Conversion-lift e2e (locked-section, exit-offer)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: production
      PORT: "5000"
      SESSION_SECRET: ci-test-session-secret
      PLAYWRIGHT_BASE_URL: http://localhost:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web SPA
        run: npx vite build --config web/vite.config.ts

      - name: Start Express server
        run: |
          npx tsx server/index.ts > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/ > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 60s" >&2
          echo "--- server.log ---" >&2
          cat server.log >&2 || true
          exit 1

      - name: Run conversion-lift Playwright specs
        run: |
          npx playwright test \
            tests/e2e/locked-section.spec.ts \
            tests/e2e/cancellation-exit-offer.spec.ts \
            --reporter=list

      - name: Stop Express server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
